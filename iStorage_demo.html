<script id="istorage_idscript" type="text/javascript"><!--show-->
'use strict';
//https://github.com/dictz 
//https://gitflic.ru/user/dictz 

async function iStorage(sid = 'iStorage_name') {
let istorage = {};

function iSCreate(sid) {///
istorage.id = sid;
istorage.dpfx = 'p__';
return new Promise(function(res, rej) {try{
  let idbRequest = window.indexedDB.open(`iStorage_${istorage.id}`, 1);

  idbRequest.onupgradeneeded = function(e) {try{
    istorage.idb = e.target.result;
    if(!istorage.idb.objectStoreNames.contains(istorage.id)) istorage.idb.createObjectStore(istorage.id);
    }catch(er){rej();}
  };

  idbRequest.onsuccess = function(e) {
    istorage.idb = e.target.result;
    istorage.idb.onversionchange = function() {istorage.idb.close();};
    istorage.idb.onerror = function(e) {};
    res();
  };

  idbRequest.onblocked = function() {try{rej();}catch(er){}};
  idbRequest.onerror = function() {try{rej();}catch(er){}};

  }catch(er){rej();}

}).then(function() {
  istorage.err = false;
  return false;

}, function() {
  istorage.err = true;
  return true;

});
};///

if(await iSCreate(sid)) return true;

istorage.setItem = function(item, x_data) {///
item = String(item);
return new Promise(function(res, rej) {try{
  let th = istorage.idb.transaction(istorage.id, 'readwrite');
  th.oncomplete = function() {res();};
  th.onabort = function() {try{rej();}catch(er){}};

  let obje = {};
  obje[istorage.dpfx + item] = istorage.dpfx + item;
  obje[item] = x_data;

  let treq = th.objectStore(istorage.id).put(obje, istorage.dpfx + item);
  treq.onsuccess = function() {};
  treq.onerror = function() {try{rej();}catch(er){}};

  }catch(er){rej();}

}).then(function() {
  istorage.err = false;
  return false;

}, function() {
  istorage.err = true;
  return true;

});
};///

istorage.getItem = function(item) {///
item = String(item);
let val;
return new Promise(function(res, rej) {try{
  let th = istorage.idb.transaction(istorage.id, 'readonly');
  th.oncomplete = function() {res(val);};
  th.onabort = function() {try{rej();}catch(er){}};

  let treq = th.objectStore(istorage.id).get(istorage.dpfx + item);
  treq.onsuccess = function(e) {
    try {
      val = e.target.result[item];
    } catch(er) {}
  };
  treq.onerror = function() {try{rej();}catch(er){}};

  }catch(er){rej();}

}).then(function(i) {
  istorage.err = false;
  return i;

}, function() {
  istorage.err = true;
  return;

});
};///

istorage.removeItem = function(item) {///
item = String(item);
return new Promise(function(res, rej) {try{
  let th = istorage.idb.transaction(istorage.id, 'readwrite');
  th.oncomplete = function() {res();};
  th.onabort = function() {try{rej();}catch(er){}};

  let treq = th.objectStore(istorage.id).delete(istorage.dpfx + item);
  treq.onsuccess = function() {};
  treq.onerror = function() {try{rej();}catch(er){}};

  }catch(er){rej();}

}).then(function() {
  istorage.err = false;
  return false;

}, function() {
  istorage.err = true;
  return true;

});
};///

istorage.clear = function() {///
return new Promise(function(res, rej) {try{
  let th = istorage.idb.transaction(istorage.id, 'readwrite');
  th.oncomplete = function() {res();};
  th.onabort = function() {try{rej();}catch(er){}};

  let treq = th.objectStore(istorage.id).clear();
  treq.onsuccess = function() {};
  treq.onerror = function() {try{rej();}catch(er){}};

  }catch(er){rej();}

}).then(function() {
  istorage.err = false;
  return false;

}, function() {
  istorage.err = true;
  return true;

});
};///

istorage.delete = function() {///
return new Promise(function(res, rej) {try{
  let idbRequest = window.indexedDB.deleteDatabase(`iStorage_${istorage.id}`);
  idbRequest.onsuccess = function(e) {res();};
  idbRequest.onerror = function() {rej();};
  }catch(er){rej();}

}).finally(function() {
  for(let key in istorage) delete istorage[key];

}).then(function() {
  return false;

}, function() {
  return true;

});
};///

return istorage;
}
</script><!--*-->

Вариант сочетания возможностей <i>IndexedDB</i> с простотой <i>LocalStorage</i>&nbsp;
<a target="_blank" href="https://github.com/dictz">GitHub</a>, <a target="_blank" href="https://gitflic.ru/user/dictz">GitFlic</a>

Функции iStorage (асинхронны) :

  • obj = await <b>iStorage('Имя хранилища')</b> — Создаёт или открывает хранилище. В случае ошибки вернёт <b>true</b> ;

  • obj<b>.setItem('имя данных', данные)</b>     — Сохраняет данные (допустимые для IndexedDB <b>*</b>) ;
  • obj<b>.getItem('имя данных')</b>             — Возвращает данные или undefined ;
  • obj<b>.removeItem('имя данных')</b>          — Удаляет данные ;
  • obj<b>.clear()</b>  — Очищает хранилище ;
  • obj<b>.delete()</b> — Удаляет хранилище ;

  • obj<b>.err</b>      — Хранит состояние последнего обращения к indexedDB:
                   <b>true</b> - была ошибка; <b>false</b> - ошибки небыло.
                   Это значение возвращается всеми obj.функция(ми) кроме <b>getItem</b>.

<b>*</b> Допустимые типы данных: <i>number, string, boolean, array, object</i> и другие.
  <i>array</i> и <i>object</i> могут содержать только допустимые типы данных.
  Недопустимые типы данных: <i>function</i> и другие. Подробнее в документации IndexedDB.

Ниже примеры с комментариями, код можно редактировать и выполнять.
В целях ограничения возможностей выполнения, редактирование становится доступным
только при отключении интернет-соединения или если html открыт с диска вашего ПК.
